<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <h1>DRUMKIT </h1>
        <br>
        <h3>type the keyboard letters shown below!</h3>
        <div class="row">
        <div class="a" data-key="a">
            <h1>A</h1>
        <p>clap</p>
     </div>
     <div class="a" data-key="s">
            <h1>S</h1>
        <p>hihat</p>
     </div>
     <div class="a" data-key="d">
            <h1>D</h1>
        <p>kick</p>
     </div>
     </div>
<div class="row" >
     <div class="a" data-key="f">
            <h1>F</h1>
        <p>openhat</p>
     </div>
     <div class="a" data-key="g">
            <h1>G</h1>
        <p>boom</p>
     </div>
     <div class="a" data-key="h">
            <h1>H</h1>
        <p>ride</p>
     </div>
     </div>
     <div class="row">
     <div class="a" data-key="j">
            <h1>J</h1>
        <p>snare</p>
     </div>
     <div class="a" data-key="k">
            <h1>K</h1>
        <p>tom</p>
     </div>
     <div class="a" data-key="l">
            <h1>L</h1>
        <p>tink</p>
     </div>
     </div>
     <audio data-key="a" src="sounds/clap.wav"></audio>
        <audio data-key="s" src="sounds/hihat.wav"></audio>
        <audio data-key="d" src="sounds/kick.wav"></audio>
        <audio data-key="f" src="sounds/openhat.wav"></audio>
        <audio data-key="g" src="sounds/boom.wav"></audio>
        <audio data-key="h" src="sounds/ride.wav"></audio>
        <audio data-key="j" src="sounds/snare.wav"></audio>
        <audio data-key="k" src="sounds/tom.wav"></audio>
        <audio data-key="l" src="sounds/tink.wav"></audio>
    </div>
</body>
<script src="script.js"></script>
</html>
